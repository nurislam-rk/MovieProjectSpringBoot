<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Movies</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f6f1eb;
      color: #333;
    }

    .navbar {
      background: #2f2a25;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .navbar a {
      color: #f5e9dc;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      color: #3b2f2f;
    }

    .container-box {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th {
      background: #e7d7c9;
      color: #3b2f2f;
      padding: 12px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    tr:hover {
      background: #fff3e6;
    }

    .section {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .badge-soft {
      background: #f3e6dc;
      padding: 5px 10px;
      border-radius: 8px;
    }

    img {
      border-radius: 10px;
      width: 100px;
    }

    input, select {
      padding: 6px;
      margin: 3px;
    }

    button {
      padding: 5px 10px;
      background: #2f2a25;
      color: white;
      border: none;
      border-radius: 5px;
    }

    a.link-btn {
      display: inline-block;
      margin-top: 5px;
      color: #3b82f6;
      text-decoration: none;
    }

    /* AI CHAT */
    .ai-box {
      margin-top: 30px;
      background: #1e293b;
      color: white;
      padding: 15px;
      border-radius: 10px;
    }

    .chat-msg-user {
      color: #93c5fd;
      margin: 5px 0;
    }

    .chat-msg-ai {
      color: #86efac;
      margin: 5px 0;
    }

    .ai-input {
      width: 75%;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

  </style>
</head>

<body>

<div class="navbar">
  <a href="/movies">🎬 Home</a>
  <a href="/movies/add">➕ Add Movie</a>
  <a href="/login">🔐 Login</a>
</div>

<h1>🎬 Movie Collection</h1>

<div class="container-box">

  <!-- 🔍 SEARCH -->
  <div class="section">
    <h3>🔍 Search</h3>

    <form method="get" action="/movies">
      <input type="text" name="keyword"
             placeholder="Search by title..."
             th:value="${keyword}">
      <button type="submit">Search</button>
    </form>
  </div>

  <!-- 🎭 FILTER -->
  <div class="section">
    <h3>🎭 Filter by Genre</h3>

    <form method="get" action="/movies">
      <select name="genreId">
        <option value="">All</option>

        <option th:each="g : ${genres}"
                th:value="${g.id}"
                th:text="${g.name}"
                th:selected="${g.id == selectedGenre}">
        </option>

      </select>

      <button type="submit">Filter</button>
    </form>
  </div>

  <!-- 🧠 AI CHAT -->
  <div class="ai-box">

    <h3>🧠 AI Assistant</h3>

    <!-- CHAT OUTPUT -->
    <div style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;">

      <div th:if="${question != null}">
        <p class="chat-msg-user">
          <b>You:</b> <span th:text="${question}"></span>
        </p>
      </div>

      <div th:if="${answer != null}">
        <p class="chat-msg-ai">
          <b>AI:</b> <span th:text="${answer}"></span>
        </p>
      </div>

    </div>

    <!-- INPUT -->
    <form method="post" action="/ai/ask" style="display:flex; gap:10px;">
      <input type="text"
             name="message"
             class="ai-input"
             placeholder="Ask AI..."
             required>

      <button type="submit">Send</button>
    </form>

  </div>

  <!-- 🎬 MOVIES -->
  <table>
    <tr>
      <th>Poster</th>
      <th>Title</th>
      <th>Description</th>
      <th>Year</th>
      <th>Rating</th>
      <th>Link</th>
      <th>Actions</th>
    </tr>

    <tr th:each="movie : ${movies}">

      <td>
        <img th:src="${movie.imageUrl}" alt="poster">
      </td>

      <td th:text="${movie.title}"></td>
      <td th:text="${movie.description}"></td>
      <td th:text="${movie.year}"></td>

      <td>
        <span class="badge-soft" th:text="${movie.rating}"></span>
      </td>

      <td>
        <a th:href="${movie.movieUrl}" target="_blank" class="link-btn">
          🔗 Open
        </a>
      </td>

      <td>

        <form th:action="@{'/movies/favorite/' + ${movie.id}}" method="post">
          <button type="submit">❤️ Favorite</button>
        </form>

        <br>

        <form th:action="@{'/movies/review/' + ${movie.id}}" method="post">
          <input type="number" name="rating" min="1" max="10" placeholder="1-10">
          <input type="text" name="comment" placeholder="Comment">
          <button type="submit">Send</button>
        </form>

        <br>

        <div>
          <b>Reviews:</b>
          <div th:each="r : ${movie.reviews}">
            ⭐ <span th:text="${r.rating}"></span>
            - <span th:text="${r.comment}"></span>
          </div>
        </div>

        <div>
          <b>Favorites:</b>
          <div th:each="f : ${movie.favorites}">
            ❤️ User: <span th:text="${f.user.id}"></span>
          </div>
        </div>

      </td>
    </tr>
  </table>

</div>

</body>
</html>
