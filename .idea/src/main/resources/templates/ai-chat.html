<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .box {
            width: 500px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #3b82f6;
            border: none;
            color: white;
        }

        .msg {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>💬 AI Chat</h2>

    <form method="post" action="/ai/ask">
        <input type="text" name="message" placeholder="Ask AI...">
        <button type="submit">Send</button>
    </form>

    <p><b>You:</b> <span th:text="${question}"></span></p>

    <p><b>AI:</b> <span th:text="${answer}"></span></p>

</div>

</body>
</html>
