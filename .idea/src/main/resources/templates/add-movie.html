<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h1>➕ Add Movie</h1>

<form action="/movies/add" method="post">

    Title:
    <input type="text" name="title" required><br><br>

    Description:
    <input type="text" name="description"><br><br>

    Year:
    <input type="number" name="year"><br><br>

    Rating:
    <input type="number" step="0.1" name="rating"><br><br>

    Image URL:
    <input type="text" name="imageUrl" placeholder="https://..." class="form-control"><br>

    Movie URL:
    <input type="text" name="movieUrl" placeholder="https://imdb.com/..." class="form-control"><br>

    <!-- 🎭 GENRE SELECT (ДОБАВЛЕНО) -->
    Genre:
    <select name="genre.id" class="form-select" style="width:200px; margin-bottom:15px;">

        <option th:each="g : ${genres}"
                th:value="${g.id}"
                th:text="${g.name}">
        </option>

    </select>

    <button type="submit" class="btn btn-dark">Save</button>

</form>

<br>
<a href="/movies">⬅ Back</a>

</body>
</html>
