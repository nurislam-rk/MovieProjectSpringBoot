<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .login-card {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="login-card">

  <h1>🔐 Login</h1>

  <form action="/login" method="post">

    <input type="text" name="login" placeholder="Login">
    <input type="password" name="password" placeholder="Password">

    <button type="submit">Login</button>

  </form>

  <p th:if="${error}" th:text="${error}" class="error"></p>

</div>

</body>
</html>
